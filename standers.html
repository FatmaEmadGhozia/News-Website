
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetNews</title>
    <link rel="icon" type="image/png" href="./images/loading.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css" />

    <style>
        .standing {
            /* background: #fff; */
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            display: block;
            height: 4px;
            width: 60px;
            background: #c0392b;
            margin: .4rem auto 0;
        }

        .standings-card {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,.10);
        }

        .table {
            margin-bottom: 0;
        }
        .table thead tr {
            background: #c0392b;
            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }
        .table thead th {
            border: none;
            padding: 1.2rem 1rem;
            vertical-align: middle;
            font-size: larger;
        }
        .table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background .18s;
        }
        .table tbody tr:hover {
            background: #fff5f5;
        }
        .table tbody td {
            border: none;
            padding: .85rem 1rem;
            vertical-align: middle;
            font-size: .9rem;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px; height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            font-weight: 700;
            font-size: .82rem;
            color: #555;
        }
        .rank-badge.top {
            background: #f0c040;
            color: #111;
        }

        .team-logo {
            width: 25px;
            height: 25px;
            object-fit: contain;
            margin-right: .25rem;
            flex-shrink: 0;
            padding-left: 3px;
        }

        .player-name {
            font-weight: 700;
            font-size: .95rem;
            color: #222;
        }

        .pts-cell {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #c0392b;
        }

        .stat-pos { color: #27ae60; font-weight: 700; }
        .stat-neg { color: #c0392b; font-weight: 700; }

        .table-footer-note {
            font-size: .75rem;
            color: #999;
            padding: .8rem 1rem;
            border-top: 1px solid #f0f0f0;
            background: #fafafa;
        }

        @media (max-width: 576px) {
            .hide-sm { display: none; }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="logo">
                <img src="./images/logo1.png" alt="LOGO NEWS image" />
            </div>
            <div class="header-img">
                <img src="./images/banner.png" alt="" />
            </div>
        </header>
        <nav>
            <ul >
                <li><a href="index.html">HOME</a></li>
                <li><a href="standers.html">STANDING</a></li>
                <li><a href="live.html">LIVE</a></li>
                <li><a href="status.html">STATUS</a></li>
                
            </ul>
            <!-- <i class="fa-solid fa-magnifying-glass"></i> -->
        </nav>

        <section class="standing">
            <div class="text-center mt-5 mb-4">
                <p class="text-uppercase text-danger fw-bold" style="letter-spacing:3px; font-size:.75rem;">Season 2024 / 25</p>
                <h1 class="section-title">Matches Standing</h1>
            </div>

            <div class="standings-card mb-5 ">
                <table class="table p-5">
                    <thead>
                        <tr>
                            <th style="width:50px">#</th>
                            <th>Player Team</th>
                            <th class="text-center hide-sm">Played</th>
                            <th class="text-center">Wins</th>
                            <th class="text-center">D</th>
                            <th class="text-center">L</th>
                            <th class="text-center hide-sm">GF</th>
                            <th class="text-center hide-sm">GA</th>
                            <th class="text-center hide-sm">GD</th>
                            <th class="text-center">Points</th>
                        </tr>
                    </thead>
                    <tbody>
                        
                    </tbody>
                    <tfoot></tfoot>
                </table>
                <div class="table-footer-note">
                    <i class="fa-solid fa-circle-info me-1"></i>
                    GF = Goals For &nbsp;|&nbsp; GA = Goals Against &nbsp;|&nbsp; GD = Goal Difference
                </div>
            </div>

        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="standers.js"></script>
</body>
</html>
