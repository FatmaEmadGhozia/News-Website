<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RetNews</title>
    <link rel="icon" type="image/png" href="./images/loading.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css" />

    <style>
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            position: relative;
            display: inline-block;
            margin-bottom: 30px;
        }

        .section-title::after {
            content: '';
            display: block;
            height: 4px;
            width: 60px;
            background: #c0392b;
            margin: .4rem auto 0;
        }

        .standings-card {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .10);
            width: 48%;
            min-width: 370px;
        }

        .table2,
        .table3 {
            margin-bottom: 0;
        }

        .table2 thead,
        .table3 thead {
            background: #c0392b;
        }

        .table2 thead tr,
        .table3 thead tr {

            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .table2 thead tr:first-child,
        .table3 thead tr:first-child {
            background: #c0392b;
            color: #fff;
            font-size: .9rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: white;
        }

        .table2 thead tr:first-child th {
            padding: 1rem;
            color: white;
        }

        .table3 thead tr:first-child th {
            padding: 1rem;
            color: white;
        }

        .table2 thead th {
            border: none;
        }

        .table3 thead th {
            border: none;
            /* padding: .95rem 1rem; */
            /* vertical-align: middle; */
        }
        .th {
            text-align: start;
        }

        .table2 tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background .18s;
        }

        .table3 tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background .18s;
        }

        .table2 tbody tr:hover {
            background: #fff5f5;
        }

        .table3 tbody tr:hover {
            background: #fff5f5;
        }

        .table2 tbody td {
            border: none;
            padding: .85rem 1rem;
            vertical-align: middle;
            font-size: .9rem;
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            font-weight: 700;
            font-size: .82rem;
            color: #555;
        }

        .rank-badge.top {
            background: #f0c040;
            color: #111;
        }

        .team-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
            margin-right: .25rem;
            flex-shrink: 0;
        }

        .player-name {
            font-weight: 700;
            font-size: .95rem;
            color: #222;
        }

        .pts-cell {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #c0392b;
        }

        .stat-pos {
            color: #27ae60;
            font-weight: 700;
        }

        .stat-neg {
            color: #c0392b;
            font-weight: 700;
        }

        .table-footer-note {
            font-size: .75rem;
            color: #999;
            padding: .8rem 1rem;
            border-top: 1px solid #f0f0f0;
            background: #fafafa;
        }

        @media (max-width: 1357px) {
            .standings-card {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="logo">
                <img src="./images/logo1.png" alt="LOGO NEWS image" />
            </div>
            <div class="header-img">
                <img src="./images/banner.png" alt="" />
            </div>
        </header>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="standers.html">STANDING</a></li>
                <li><a href="live.html">LIVE</a></li>
                <li><a href="status.html">STATUS</a></li>

            </ul>

        </nav>

        <section class="standing">
            <div class="text-center mt-5 mb-4">
                <p class="text-uppercase text-danger fw-bold" style="letter-spacing:3px; font-size:.75rem;">Season 2025
                    / 26</p>
                <h1 class="section-title">Matches Standing</h1>
            </div>
            <div class="tables-container w-100  d-flex justify-content-space-between gap-4 flex-wrap">
                <div class="standings-card mb-5 ">
                    <!-- <button class=" sort btn btn-outline-danger ms-115">SORT</button> -->
                    <table class="table2 p-4 ">
                        <thead class="text-white">
                            <tr>
                                <th colspan="4" class="-mt-2 table-head">TOP SCORERS</th>
                            </tr>
                            <tr>
                                <th style="">#</th>
                                <th class="th">Player Name</th>
                                <th class="text-center">G</th>
                                <th class="text-center">A</th>

                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                        <tfoot></tfoot>
                    </table>
                    <div class="table-footer-note">
                        <i class="fa-solid fa-circle-info me-1"></i>
                        G = Goals &nbsp;|&nbsp; A = Assists
                    </div>
                </div>
                <div class="standings-card mb-5 ">
                    <table class="table3 p-4 border">
                        <thead class="text-white">
                            <tr>
                                <th colspan="4" class='-mt-3 table-head'>CARDS</th>
                            </tr>
                            <tr>
                                <th style="width:50px">#</th>
                                <th>Player Name</th>
                                <th class="text-center">Y</th>
                                <th class="text-center">R</th>

                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                        <tfoot></tfoot>
                    </table>
                    <div class="table-footer-note">
                        <i class="fa-solid fa-circle-info me-1"></i>
                        Y = Yellow Cards &nbsp;|&nbsp; R = Red Cards
                    </div>
                </div>
            </div>

        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/status.js"></script>
</body>

</html>
